{% extends 'trailers/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h3 class="fw-bold">🔐 Inicio de sesión</h3>
          <p class="text-muted">Ingresa tu usuario y contraseña</p>
        </div>

        {% if form.errors %}
          <div class="alert alert-danger d-flex align-items-center" role="alert">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-exclamation-triangle-fill me-2 flex-shrink-0" viewBox="0 0 16 16">
              <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
            </svg>
            <span>Usuario o contraseña incorrectos.</span>
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i>👤</span>
              <input type="text" name="username" class="form-control form-control-lg" placeholder="Tu nombre de usuario" autofocus required id="id_username">
            </div>
          </div>
          <div class="mb-4">
            <label for="id_password" class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text">🔒</span>
              <input type="password" name="password" class="form-control form-control-lg" placeholder="Tu contraseña" required id="id_password">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-100">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
